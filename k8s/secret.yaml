# ──────────────────────────────────────────────────────────────────────────────
# HOW TO APPLY:
#   kubectl apply -f secret.yaml
#
# Values below are base64-encoded. To encode your own:
#   echo -n "your-value" | base64
#
# nextstack-secret-1  →  app secrets (session key, API key)
# nextstack-secret-2  →  database / external service credentials
# ──────────────────────────────────────────────────────────────────────────────

# Secret 1 — Application Secrets
apiVersion: v1
kind: Secret
metadata:
  name: nextstack-app-secret
  namespace: nextstack
  labels:
    app: nextstack
type: Opaque
data:
  # "nextstack-session-secret-key-2026" | base64
  SESSION_SECRET: bmV4dHN0YWNrLXNlc3Npb24tc2VjcmV0LWtleS0yMDI2
  # "nextstack-api-key-abc123" | base64
  API_KEY: bmV4dHN0YWNrLWFwaS1rZXktYWJjMTIz

---
# Secret 2 — Database / External Service Credentials
apiVersion: v1
kind: Secret
metadata:
  name: nextstack-db-secret
  namespace: nextstack
  labels:
    app: nextstack
type: Opaque
data:
  # "nextstack_db_user" | base64
  DB_USER: bmV4dHN0YWNrX2RiX3VzZXI=
  # "nextstack_db_pass_2026!" | base64
  DB_PASSWORD: bmV4dHN0YWNrX2RiX3Bhc3NfMjAyNiE=
  # "mongodb://nextstack-db:27017/nextstack" | base64
  DB_URI: bW9uZ29kYjovL25leHRzdGFjay1kYjoyNzAxNy9uZXh0c3RhY2s=
