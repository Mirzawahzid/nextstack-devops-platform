apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextstack-ingress
  namespace: nextstack
  labels:
    app: nextstack
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: nextstack.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextstack-service
                port:
                  number: 80
